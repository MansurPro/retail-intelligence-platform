<!doctype html>
<html lang="en" class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100 min-h-screen">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retail Intelligence Platform</title>

    <!-- Import readable and futuristic fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Optional: Animate.css for nice simple animations -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
      /* Global reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        font-family: 'Inter', system-ui, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(34, 211, 238, 0.16), transparent 30%),
          radial-gradient(circle at bottom right, rgba(129, 140, 248, 0.18), transparent 35%),
          linear-gradient(135deg, #0f172a, #111827 45%, #1e1b4b);
        color: #e5eef8;
        min-height: 100vh;
        overflow-x: hidden;
      }

      #root {
        min-height: 100vh;
      }

      /* Toned-down neon heading treatment */
      h1, h2 {
        font-family: 'Orbitron', 'Inter', system-ui, sans-serif;
        color: #67e8f9;
        text-shadow: 0 0 10px rgba(34, 211, 238, 0.28);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      /* Cards for any panels */
      .card {
        background: rgba(15, 23, 42, 0.74);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(103, 232, 249, 0.18);
        border-radius: 1rem;
        padding: 2rem;
        margin: 2rem 0;
        box-shadow: 0 18px 55px rgba(2, 6, 23, 0.36);
        width: 100%;
        max-width: 600px;
      }
    </style>

  </head>
  <body>
    <div id="root" class="animate__animated animate__fadeIn">
      <!-- Your React/Svelte/Vite app will mount here -->
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
